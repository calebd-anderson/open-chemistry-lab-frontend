<!-- users table -->
<section>
  <div>
    <form>
      <button
        type="button"
        (click)="getUsers(true)"
        matFab
        aria-label="refresh users button"
      >
        @if (refreshing) {
          <i class="fas fa-sync fa-spin"></i>
        }
        @if (!refreshing) {
          <!-- <i class="fas fa-sync"></i> -->
          <mat-icon>refresh</mat-icon>
        }
      </button>
      <button
        [hidden]="!isManager"
        type="button"
        (click)="onClickNewUser()"
        matFab
        extended
        aria-label="create user button"
      >
        <mat-icon>add</mat-icon>New User
      </button>
      <input
        name="searchTerm"
        #searchInput="ngModel"
        ngModel
        (ngModelChange)="searchUsers(searchInput.value)"
        type="search"
        placeholder="Search users..."
      />
    </form>
  </div>

  @if (users) {
    <table mat-table [dataSource]="users" class="mat-elevation-z8">
      @for (column of tableDef; track column) {
        <ng-container matColumnDef="{{ column.id }}">
          <th mat-header-cell *matHeaderCellDef>{{ column.label }}</th>
          <td mat-cell *matCellDef="let user">{{ user[column.id] }}</td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: columnsToDisplay"
        (click)="onSelectUser(row)"
      ></tr>
    </table>
  }
</section>
