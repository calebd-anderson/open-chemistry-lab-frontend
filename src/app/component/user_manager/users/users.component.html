<!-- users table -->
<section>
  <div>
    <form>
      <button
        type="button"
        (click)="getUsers(true)"
        aria-label="refresh users button"
      >
        @if (refreshing) {
          <i class="fas fa-sync fa-spin"></i>
        }
        @if (!refreshing) {
          <i class="fas fa-sync"></i>
        }
      </button>
      <button
        [hidden]="!isManager"
        type="button"
        (click)="onClickNewUser()"
        aria-label="create user button"
      >
        <i class="fas fa-add"></i>
        New User
      </button>
      <input
        name="searchTerm"
        #searchInput="ngModel"
        ngModel
        (ngModelChange)="searchUsers(searchInput.value)"
        type="search"
        placeholder="Search users..."
      />
    </form>
  </div>

  @if (users) {
    <table>
      <thead>
        <tr>
          <th>Photo</th>
          <th>User ID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      @for (appUser of users; track appUser.userId) {
        <tbody>
          <tr (click)="onSelectUser(appUser)">
            <td>
              <img
                height="40"
                width="40"
                src="{{ appUser?.profileImgUrl }}"
                alt="profile image"
              />
            </td>
            <td>{{ appUser?.userId }}</td>
            <td>{{ appUser?.firstName }}</td>
            <td>{{ appUser?.lastName }}</td>
            <td>{{ appUser?.username }}</td>
            <td>{{ appUser?.email }}</td>
            <td>
              <span [hidden]="!appUser?.active" class="">Active</span>
              <span [hidden]="appUser?.active" class="">Inactive</span>
            </td>
            <td>
              <div>
                <button
                  aria-label="edit button"
                  (click)="onEditUser($event, appUser)"
                >
                  <i class="fa fa-edit"></i>
                </button>
                <button
                  aria-label="delete button"
                  (click)="onDeleteUser(appUser.username)"
                  class="mat-button-trash"
                  [disabled]="currentUsername === appUser.username"
                >
                  <i class="fa fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      }
    </table>
  }
</section>
