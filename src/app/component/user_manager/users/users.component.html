<!-- users table -->
<section>
  <div>
    <form>
      <button type="button" (click)="getUsers(true)" matFab aria-label="refresh users button">
        @if (refreshing) {
        <i class="fas fa-sync fa-spin"></i>
        }
        @if (!refreshing) {
        <!-- <i class="fas fa-sync"></i> -->
        <mat-icon>refresh</mat-icon>
        }
      </button>
      <button [hidden]="!isManager" type="button" (click)="onClickNewUser()" matFab extended
        aria-label="create user button">
        <mat-icon>add</mat-icon>New User
      </button>
      <input name="searchTerm" #searchInput="ngModel" ngModel (ngModelChange)="searchUsers(searchInput.value)"
        type="search" placeholder="Search users..." />
    </form>
  </div>

  @if (users) {
  <table mat-table [dataSource]="users" class="mat-elevation-z8">
    <!-- <thead>
      <tr>
        <th>Photo</th>
        <th>User ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Username</th>
        <th>Email</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead> -->
    <!-- User Id Column -->
    <ng-container matColumnDef="userId">
      <th mat-header-cell *matHeaderCellDef>Id.</th>
      <td mat-cell *matCellDef="let user">{{ user.userId }}</td>
    </ng-container>

    <ng-container matColumnDef="firstName">
      <th mat-header-cell *matHeaderCellDef>First name</th>
      <td mat-cell *matCellDef="let user">{{ user.firstName }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="onSelectUser(user)"></tr>
  </table>
  }

</section>
